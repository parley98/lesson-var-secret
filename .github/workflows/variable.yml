name: Variable workflow

env:
  WF_VAR: "Workflow level variable"

on:
  push:
      

jobs:
  variable_test: 
    env:
      JOB_VAR: "Job level variable"
    name: job to test variable
    runs-on: ubuntu-latest
    steps:
      - name: test variable
        id: stepId
        env:
          STEP_VAR: "Step level variable"
        run: |
          echo "${{ github.actor }}"
          echo "$GITHUB_JOB"
          echo "$WF_VAR"
          echo "$JOB_VAR"
          echo "$STEP_VAR"
          echo "${{ vars.CONF_VAR }}"
          echo "${{ secrets.A_SECRET }}"
      
  
